<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>License Checker - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(59, 130, 246, 0.05) 0%, transparent 70%);
            z-index: -1;
            animation: bgPulse 8s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        /* Glassmorphism Card */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow:
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.4);
        }

        .header-icon svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        .header h1 {
            color: #ffffff;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        /* Input Section */
        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px 20px;
            color: white;
            font-size: 15px;
            font-family: 'Monaco', 'Consolas', monospace;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #6366f1;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* Button */
        .btn {
            width: 100%;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none;
            border-radius: 12px;
            padding: 16px 24px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Loading State */
        .loading {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        /* Result Section */
        .result {
            display: none;
            margin-top: 24px;
        }

        .result.show {
            display: block;
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .status-badge.active {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .status-badge.blocked {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .status-badge.not-found {
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        .status-badge.expired {
            background: rgba(249, 115, 22, 0.15);
            color: #f97316;
            border: 1px solid rgba(249, 115, 22, 0.3);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Info Grid */
        .info-grid {
            display: grid;
            gap: 12px;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .info-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .info-value {
            color: white;
            font-size: 14px;
            font-weight: 500;
            word-break: break-all;
            text-align: right;
        }

        .info-value.copyable {
            font-family: 'Monaco', 'Consolas', monospace;
            cursor: pointer;
            transition: color 0.2s;
        }

        .info-value.copyable:hover {
            color: #6366f1;
        }

        /* Features Tags */
        .features-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .features-title {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .features-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .feature-tag {
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .feature-tag.all {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        /* Days Counter */
        .days-counter {
            text-align: center;
            padding: 20px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 16px;
            margin-top: 20px;
        }

        .days-number {
            font-size: 48px;
            font-weight: 700;
            color: #6366f1;
            line-height: 1;
        }

        .days-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            margin-top: 8px;
        }

        .days-label.lifetime {
            color: #22c55e;
            font-size: 16px;
            font-weight: 600;
        }

        /* Actions */
        .actions {
            margin-top: 24px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 20px;
            color: white;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .btn-secondary svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Error State */
        .error-message {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: #fca5a5;
        }

        .error-message.show {
            display: block;
        }

        .error-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        /* Notice Banner */
        .notice-banner {
            display: none;
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            color: #fbbf24;
            font-size: 14px;
        }

        .notice-banner.show {
            display: block;
        }

        .notice-banner strong {
            display: block;
            margin-bottom: 4px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card {
                padding: 24px;
                border-radius: 20px;
            }

            .header h1 {
                font-size: 20px;
            }

            .actions {
                grid-template-columns: 1fr;
            }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 14px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="header-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
                </div>
                <h1>License Checker</h1>
                <p>Verify license status by Android ID</p>
            </div>

            <!-- Notice Banner -->
            <div class="notice-banner" id="noticeBanner">
                <strong>📢 Server Notice</strong>
                <span id="noticeText"></span>
            </div>

            <!-- Input Form -->
            <div id="inputSection">
                <div class="input-group">
                    <label class="input-label">Android ID</label>
                    <div class="input-wrapper">
                        <input type="text" class="input-field" id="androidIdInput"
                               placeholder="Enter 16-character Android ID"
                               maxlength="32">
                    </div>
                </div>

                <button class="btn" id="checkBtn" onclick="checkLicense()">
                    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                    Check License
                </button>
            </div>

            <!-- Loading -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div class="loading-text">Verifying license...</div>
            </div>

            <!-- Error -->
            <div class="error-message" id="error">
                <div class="error-icon">⚠️</div>
                <div id="errorText">Unable to fetch license data</div>
            </div>

            <!-- Result -->
            <div class="result" id="result">
                <div class="status-badge" id="statusBadge">
                    <span class="status-dot"></span>
                    <span id="statusText">Status</span>
                </div>

                <div class="info-grid">
                    <div class="info-item">
                        <div>
                            <div class="info-label">Name</div>
                            <div class="info-value" id="name">-</div>
                        </div>
                    </div>
                    <div class="info-item">
                        <div>
                            <div class="info-label">Phone</div>
                            <div class="info-value" id="phone">-</div>
                        </div>
                    </div>
                    <div class="info-item">
                        <div>
                            <div class="info-label">License Key</div>
                            <div class="info-value copyable" id="licenseKey" onclick="copyToClipboard(this)">-</div>
                        </div>
                    </div>
                    <div class="info-item">
                        <div>
                            <div class="info-label">Plan</div>
                            <div class="info-value" id="plan">-</div>
                        </div>
                    </div>
                    <div class="info-item">
                        <div>
                            <div class="info-label">Created</div>
                            <div class="info-value" id="created">-</div>
                        </div>
                    </div>
                    <div class="info-item">
                        <div>
                            <div class="info-label">Device Model</div>
                            <div class="info-value" id="deviceModel">-</div>
                        </div>
                    </div>
                </div>

                <!-- Days Counter -->
                <div class="days-counter" id="daysCounter">
                    <div class="days-number" id="daysNumber">-</div>
                    <div class="days-label" id="daysLabel">Days Remaining</div>
                </div>

                <!-- Features -->
                <div class="features-section" id="featuresSection" style="display:none;">
                    <div class="features-title">Features</div>
                    <div class="features-tags" id="featuresTags"></div>
                </div>

                <!-- Actions -->
                <div class="actions">
                    <button class="btn-secondary" onclick="copyAll()">
                        <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                        Copy All
                    </button>
                    <button class="btn-secondary" onclick="shareResult()">
                        <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
                        Share
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">Copied!</div>

    <script>
        // ==================== CONFIGURATION ====================
        const LICENSE_URL = 'https://raw.githubusercontent.com/USERNAME/REPO/main/licenses.json';
        const APP_ID = 'jomimap_pro';

        // ==================== STATE ====================
        let currentLicense = null;
        let cachedData = null;

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', function() {
            // Check for ID in URL
            const urlParams = new URLSearchParams(window.location.search);
            const idFromUrl = urlParams.get('id');

            if (idFromUrl) {
                document.getElementById('androidIdInput').value = idFromUrl;
                checkLicense();
            }
        });

        // ==================== MAIN FUNCTIONS ====================
        async function checkLicense() {
            const androidId = document.getElementById('androidIdInput').value.trim();

            if (!androidId) {
                showToast('Please enter an Android ID');
                return;
            }

            // Show loading
            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('loading').classList.add('show');
            document.getElementById('error').classList.remove('show');
            document.getElementById('result').classList.remove('show');

            try {
                // Fetch license data with cache-busting
                const data = await fetchLicenseData();
                cachedData = data;

                // Check maintenance
                if (data.maintenance) {
                    showMaintenance(data.maintenance_message);
                    return;
                }

                // Show notice if exists
                if (data.notice) {
                    showNotice(data.notice);
                }

                // Find app
                const app = data.apps?.[APP_ID];
                if (!app) {
                    showError('App "' + APP_ID + '" not found in license system');
                    return;
                }

                // Check if app is enabled
                if (!app.enabled) {
                    showError('This app is currently disabled');
                    return;
                }

                // Find license
                const licenses = app.licenses;
                const license = licenses?.[androidId];

                if (!license) {
                    showNotFound();
                    return;
                }

                // Show license info
                showLicense(license, app.notice);

            } catch (error) {
                console.error('Error:', error);
                showError('Failed to fetch license data. Please try again.');
            }
        }

        async function fetchLicenseData() {
            const url = LICENSE_URL + '?t=' + Date.now();

            const response = await fetch(url, {
                method: 'GET',
                headers: {
                    'Accept': 'application/json',
                    'Cache-Control': 'no-cache'
                }
            });

            if (!response.ok) {
                throw new Error('HTTP ' + response.status);
            }

            return await response.json();
        }

        // ==================== DISPLAY FUNCTIONS ====================
        function showLicense(license, appNotice) {
            document.getElementById('loading').classList.remove('show');
            document.getElementById('result').classList.add('show');

            currentLicense = license;

            // Status
            const badge = document.getElementById('statusBadge');
            badge.className = 'status-badge ' + license.status;
            document.getElementById('statusText').textContent = capitalize(license.status);

            // Info
            document.getElementById('name').textContent = license.name || '-';
            document.getElementById('phone').textContent = license.phone || '-';
            document.getElementById('licenseKey').textContent = license.license_key || '-';
            document.getElementById('plan').textContent = capitalize(license.plan);
            document.getElementById('created').textContent = license.created_at || '-';
            document.getElementById('deviceModel').textContent = license.device_model || '-';

            // Days counter
            const daysCounter = document.getElementById('daysCounter');
            const daysNumber = document.getElementById('daysNumber');
            const daysLabel = document.getElementById('daysLabel');

            if (license.plan === 'lifetime') {
                daysNumber.textContent = '∞';
                daysLabel.textContent = 'Lifetime License';
                daysLabel.classList.add('lifetime');
                daysCounter.style.background = 'rgba(34, 197, 94, 0.1)';
                daysNumber.style.color = '#22c55e';
            } else if (license.expiry) {
                const daysLeft = calculateDaysLeft(license.expiry);
                daysNumber.textContent = daysLeft;
                daysLabel.textContent = 'Days Remaining';
                daysLabel.classList.remove('lifetime');

                if (daysLeft <= 0) {
                    daysNumber.style.color = '#ef4444';
                    daysLabel.textContent = 'License Expired';
                } else if (daysLeft <= 7) {
                    daysNumber.style.color = '#f97316';
                } else {
                    daysNumber.style.color = '#6366f1';
                }
            }

            // Features
            const featuresSection = document.getElementById('featuresSection');
            const featuresTags = document.getElementById('featuresTags');

            if (license.features && license.features.length > 0) {
                featuresSection.style.display = 'block';
                featuresTags.innerHTML = license.features.map(f => {
                    const cls = f === 'all' ? 'all' : '';
                    return `<span class="feature-tag ${cls}">${f}</span>`;
                }).join('');
            } else {
                featuresSection.style.display = 'none';
            }

            // Show app notice if exists
            if (appNotice) {
                showNotice(appNotice);
            }
        }

        function showNotFound() {
            document.getElementById('loading').classList.remove('show');
            document.getElementById('result').classList.add('show');

            currentLicense = null;

            const badge = document.getElementById('statusBadge');
            badge.className = 'status-badge not-found';
            document.getElementById('statusText').textContent = 'Not Found';

            document.getElementById('name').textContent = '-';
            document.getElementById('phone').textContent = '-';
            document.getElementById('licenseKey').textContent = '-';
            document.getElementById('plan').textContent = '-';
            document.getElementById('created').textContent = '-';
            document.getElementById('deviceModel').textContent = '-';

            document.getElementById('daysNumber').textContent = '0';
            document.getElementById('daysLabel').textContent = 'License not found';
            document.getElementById('daysLabel').classList.remove('lifetime');

            document.getElementById('featuresSection').style.display = 'none';
        }

        function showMaintenance(message) {
            document.getElementById('loading').classList.remove('show');
            document.getElementById('inputSection').style.display = 'block';

            const badge = document.getElementById('statusBadge');
            badge.className = 'status-badge blocked';
            document.getElementById('statusText').textContent = 'Maintenance';

            document.getElementById('error').classList.add('show');
            document.getElementById('errorText').innerHTML =
                '<div style="font-size:32px;margin-bottom:12px;">🔧</div>Server Under Maintenance<br><br>' +
                '<small>' + (message || 'Please try again later') + '</small>';
        }

        function showError(message) {
            document.getElementById('loading').classList.remove('show');
            document.getElementById('inputSection').style.display = 'block';
            document.getElementById('error').classList.add('show');
            document.getElementById('errorText').textContent = message;
        }

        function showNotice(message) {
            const banner = document.getElementById('noticeBanner');
            const text = document.getElementById('noticeText');
            text.textContent = message;
            banner.classList.add('show');
        }

        // ==================== UTILITY FUNCTIONS ====================
        function calculateDaysLeft(expiryDate) {
            if (!expiryDate) return 0;

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const expiry = new Date(expiryDate);
            expiry.setHours(0, 0, 0, 0);

            const diff = expiry - today;
            return Math.ceil(diff / (1000 * 60 * 60 * 24));
        }

        function capitalize(str) {
            if (!str) return '';
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        function copyToClipboard(element) {
            const text = element.textContent;
            navigator.clipboard.writeText(text).then(() => {
                showToast('Copied!');
            });
        }

        function copyAll() {
            if (!currentLicense) return;

            const text = `
License Information
==================
Status: ${currentLicense.status}
Name: ${currentLicense.name}
Phone: ${currentLicense.phone}
License Key: ${currentLicense.license_key}
Plan: ${currentLicense.plan}
Expiry: ${currentLicense.expiry || 'Lifetime'}
Created: ${currentLicense.created_at || '-'}
Features: ${(currentLicense.features || []).join(', ')}
            `.trim();

            navigator.clipboard.writeText(text).then(() => {
                showToast('All info copied!');
            });
        }

        function shareResult() {
            if (!currentLicense) return;

            const text = `License: ${currentLicense.license_key}
Status: ${currentLicense.status}
Name: ${currentLicense.name}
Plan: ${currentLicense.plan}
Days Left: ${currentLicense.plan === 'lifetime' ? '∞' : calculateDaysLeft(currentLicense.expiry)}`;

            if (navigator.share) {
                navigator.share({
                    title: 'License Info',
                    text: text
                });
            } else {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('Shared info copied!');
                });
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // Enter key to submit
        document.getElementById('androidIdInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkLicense();
            }
        });
    </script>
</body>
</html>
